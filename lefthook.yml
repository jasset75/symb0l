# Lefthook configuration for pre-commit hooks
# https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  commands:
    compile-diagrams:
      run: pnpm --filter @symb0l/core compile-diagrams
      stage_fixed: true

    lint-staged:
      glob: "*.{js,ts,mjs}"
      run: |
        pnpm -r lint

    format-staged:
      glob: "*.{json,md,yml,yaml}"
      run: pnpm -r format

    type-check:
      glob: "**/*.{ts,tsx}"
      run: pnpm -r build

    # tests:
    #   glob: "**/*.{ts,tsx}"
    #   run: pnpm -r test

pre-push:
  commands:
    integration-tests:
      run: just test-integration
